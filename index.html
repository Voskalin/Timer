<script>
function setCustomTime() {
  if (!running) {
      let inputHours = document.getElementById("customHours").value;
      let inputMinutes = document.getElementById("customMinutes").value;
      let inputSeconds = document.getElementById("customSeconds").value;

      let newSeconds = (parseInt(inputHours) || 0) * 3600 + 
                       (parseInt(inputMinutes) || 0) * 60 + 
                       (parseInt(inputSeconds) || 0);

      if (newSeconds > 0) {
          seconds = newSeconds;
          updateTimerDisplay();
      } else {
          alert("PLEASE ENTER THE RIGHT VARIABLE");
      }
  }
}
</script>

        <script>
            let countdown;
            let seconds = 300; // 5 menit
            let running = false;
    
            function updateTimerDisplay() {
                let hrs = String(Math.floor(seconds / 3600)).padStart(2, '0');
                let mins = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
                let secs = String(seconds % 60).padStart(2, '0');
                document.getElementById("timer").textContent = `${hrs}:${mins}:${secs}`;
            }
    
            function startCountdown() {
                if (!running && seconds > 0) {
                    running = true;
                    countdown = setInterval(() => {
                        if (seconds > 0) {
                            seconds--;
                            updateTimerDisplay();
                        } else {
                            clearInterval(countdown);
                            running = false;
                            alert("Waktu habis!");
                        }
                    }, 1000);
                }
            }
    
            function pauseCountdown() {
                running = false;
                clearInterval(countdown);
            }
    
            function resetCountdown() {
                running = false;
                clearInterval(countdown);
                seconds = 300; // E2-6110 bangsat
                updateTimerDisplay();
            }
    
            updateTimerDisplay();
        </script>
