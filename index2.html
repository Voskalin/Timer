<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advancedtimer</title>
    <style>
      body {
        font-family:'Segoe UI', Tahoma, Verdana, sans-serif;
        text-align: center;
        margin: 0px; 
        background: linear-gradient(135deg, #262838, #2b3a3d);
        justify-content: center;  /* Horizontal center */
      align-items: center;      /* Vertical center */
      }
      #timer {
        font-size: 5rem;
        margin: 20px;
        font-style: o;
        font-weight: bold;
        color:yellow;
      }
      button {
            background-color: rgb(238, 255, 0);
            border: 2px solid #bab517;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 20px;
            cursor: pointer;
            font-family:'Segoe UI', Tahoma, Verdana, sans-serif;
      }
       input {
            padding: 12px 16px;
    width: 185px;
    font-size: 20px;
    border: 2px solid #a1ab1c;
    border-radius: 8px;
    outline: none;
    transition: all 0.3s ease;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
         button:hover {
    background-color: #12577a;
    color: white;
    transform: scale(1.07);
    transition: all 0.2s ease;
}
      h1 {
        font-size: xx-large;
        color: aliceblue;
      }
      .timer {
        font-weight: bold;
        color: aliceblue;
      }
      p {
        color: aliceblue;
      }
      hr {
        color: transparent;
        border-color: transparent;
      }
      
    </style>
    </head>

<body>
    <h1>Stopwatch</h1>
    <div id="timer">00:00:00</div>
    <button class="start" onclick="startStopwatch()">Start</button>
    <button class="stop" onclick="pauseStopwatch()">Pause</button>
    <button class="reset" onclick="resetStopwatch()">Reset</button>

<hr>

<button onclick="history.back()">Back to Timer</button>


    <script>
        let stopwatchInterval;
        let elapsedTime = 0;
        let running = false;

        function updateStopwatchDisplay() {
            let hours = Math.floor(elapsedTime / 3600);
            let minutes = Math.floor((elapsedTime % 3600) / 60);
            let seconds = elapsedTime % 60;

            document.getElementById("timer").textContent =
                String(hours).padStart(2, "0") + ":" +
                String(minutes).padStart(2, "0") + ":" +
                String(seconds).padStart(2, "0");
        }

        function startStopwatch() {
            if (!running) {
                running = true;
                stopwatchInterval = setInterval(() => {
                    elapsedTime++;
                    updateStopwatchDisplay();
                }, 1000);
            }
        }

        function pauseStopwatch() {
            running = false;
            clearInterval(stopwatchInterval);
        }

        function resetStopwatch() {
            running = false;
            clearInterval(stopwatchInterval);
            elapsedTime = 0;
            updateStopwatchDisplay();
        }
    </script>

</body>
</html>
